function iconFor(name){
  const k = name.toLowerCase().replace(/\s+/g,'');
  if(k.includes('spotify')) return ICONS.spotify;
  if(k.includes('apple')) return ICONS.apple;
  if(k.includes('tidal')) return ICONS.tidal;
  if(k.includes('instagram')) return ICONS.instagram;
  if(k.includes('tiktok')) return ICONS.tiktok;
  if(k.includes('youtube')) return ICONS.youtube;
  if(k === 'x' || k.includes('twitter')) return ICONS.x;
  return ICONS.play;

const run = f => { try { f(); } catch (e) { console.error(e); } };
run(() => {
/* hero */
document.title = `${SITE.artistName} | Out Now`;
const heroSrc = SITE.heroImage === "embedded" ? EMBEDDED_HERO : SITE.heroImage;
if(isSet(heroSrc)){
  document.getElementById('heroBg').style.backgroundImage = `url("${heroSrc}")`;
  document.querySelector('.hero').classList.add('has-photo');
}
document.getElementById('heroSub').innerHTML =
  `<strong>&ldquo;${SITE.album.title}&rdquo;</strong> is streaming now on all major platforms.`;
const streamBtns = sel => document.getElementById(sel).innerHTML = SITE.streamingLinks.map((s,i)=>
  `<a class="btn ${i===0?'btn-solid':''}" href="${isSet(s.url)?s.url:'#'}" target="_blank" rel="noopener">${iconFor(s.name)} ${s.name}</a>`
).join('');
streamBtns('heroButtons');
streamBtns('connectButtons');
});
run(() => {
/* ticker */
const tick = `<span><b>${SITE.artistName}</b> &nbsp;<i>&#9679;</i>&nbsp; Self-titled album &nbsp;<i>&#9679;</i>&nbsp; Out now &nbsp;<i>&#9679;</i>&nbsp; Streaming everywhere &nbsp;<i>&#9679;</i>&nbsp;</span>`;
document.getElementById('tickerTrack').innerHTML = tick.repeat(6);
});
run(() => {
/* album */
const coverSrc = SITE.album.coverImage === "embedded" ? EMBEDDED_COVER : SITE.album.coverImage;
const coverEl = document.getElementById('cover');
if(isSet(coverSrc)){
  coverEl.innerHTML = `<img src="${coverSrc}" alt="${SITE.album.title} album cover">`;
}
coverEl.classList.add('cover-click');
coverEl.setAttribute('role','button');
coverEl.setAttribute('tabindex','0');
coverEl.setAttribute('aria-label','Play the album');
const playAlbum = () => {
  playerHost.scrollIntoView({ behavior: 'smooth', block: 'center' });
  playerHost.classList.add('nudge');
  clearTimeout(window._nudgeT);
  window._nudgeT = setTimeout(() => playerHost.classList.remove('nudge'), 8000);
};
coverEl.addEventListener('click', playAlbum);
coverEl.addEventListener('keydown', e => { if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); playAlbum(); } });

document.getElementById('coverName').textContent = SITE.artistName;
document.getElementById('coverYear').textContent = `${SITE.album.descriptor} \u00B7 ${SITE.album.year}`;
document.getElementById('coverCount').textContent = `${SITE.tracks.length} tracks`;
document.getElementById('albumNote').textContent = SITE.album.note;
const playerHost = document.getElementById('spotifyPlayer');
document.getElementById('tracklist').innerHTML = SITE.tracks.map((t,i)=>
  `<div class="track">
     <span class="track-num">${String(i+1).padStart(2,'0')}</span>
     <span class="track-title">${t.title}</span>
     <span class="track-time">${t.time||''}</span>
   </div>`
).join('');
});
run(() => {
/* bio */
document.getElementById('bioLede').textContent = SITE.bio.lede;
const bioSrc = SITE.bio.photo === "embedded" ? EMBEDDED_BIO : SITE.bio.photo;
if(isSet(bioSrc)){
  document.getElementById('bioPhoto').innerHTML = `<img src="${bioSrc}" alt="${SITE.artistName} press photo">`;
}
document.getElementById('bioParas').innerHTML =
  SITE.bio.paragraphs.filter(p=>!p.startsWith('PASTE_')).map(p=>`<p>${p}</p>`).join('') || '';
});
run(() => {
/* connect + footer */
document.getElementById('connectLede').textContent =
  `${SITE.album.descriptor} is out now. For booking, features, and press, reach out directly.`;
document.getElementById('footName').textContent = SITE.artistName;
document.getElementById('navBrand').textContent = SITE.artistName;
document.getElementById('socialsRow').innerHTML = SITE.socials.map(s=>
  `<a class="soc" href="${isSet(s.url)?s.url:'#'}" target="_blank" rel="noopener" aria-label="${s.name}" title="${s.name}">${iconFor(s.name)}</a>`
).join('');
document.getElementById('footLegal').innerHTML =
  `&copy; ${SITE.copyrightYear} ${SITE.artistName}. All rights reserved.` +
  (isSet(SITE.contactEmail) ? `<br>Booking &amp; press: <a href="mailto:${SITE.contactEmail}">${SITE.contactEmail}</a>` : '') +
  `<br>Site by <a href="https://mosecreativ.com" target="_blank" rel="noopener">MoseCreativ</a> &middot; v14`;
});
run(() => {
/* work with */
const sv = SITE.services;
const email = isSet(SITE.contactEmail) ? SITE.contactEmail : null;
const mail = subj => email ? `mailto:${email}?subject=${encodeURIComponent(subj)}` : '#';
const beatsHref = isSet(sv.beats.link) ? sv.beats.link : mail('Beat inquiry from jaquaimusic.com');
const writeHref = mail('Songwriting commission from jaquaimusic.com');
document.getElementById('workGrid').innerHTML = `
  <div class="work-card">
    <span class="wc-num">For producers &amp; artists</span>
    <h3>${sv.beats.title}</h3>
    <p>${sv.beats.blurb}</p>
    <a class="btn btn-solid" href="${beatsHref}" ${isSet(sv.beats.link)?'target="_blank" rel="noopener"':''}>${ICONS.play} ${isSet(sv.beats.link)?'Browse beats':'Inquire about beats'}</a>
  </div>
  <div class="work-card">
    <span class="wc-num">For artists &amp; labels</span>
    <h3>${sv.songwriting.title}</h3>
    <p>${sv.songwriting.blurb}</p>
    <a class="btn" href="${writeHref}">Commission a song</a>
  </div>
  <div class="work-card">
    <span class="wc-num">For film &amp; TV</span>
    <h3>${sv.sync.title}</h3>
    <p>${sv.sync.blurb}</p>
    <a class="btn" href="${mail('Sync licensing inquiry from jaquaimusic.com')}">License music</a>
  </div>`;
});
run(() => {
/* scroll reveal */
const io = new IntersectionObserver(es=>es.forEach(e=>{
  if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}
}),{threshold:.12});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
});
</script>
</body>
</html>
